<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bienvenido a mi Servidor NGINX 🚀</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0077b6, #00b4d8, #90e0ef);
      color: #fff;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    h1 {
      font-size: 3em;
      margin: 0.3em 0;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.4);
    }
    p {
      font-size: 1.3em;
      margin-bottom: 1.5em;
    }
    .button {
      background: #fff;
      color: #0077b6;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1em;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }
    .button:hover {
      background: #90e0ef;
      color: #03045e;
      transform: scale(1.05);
    }
    footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      font-size: 0.9em;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <h1>🚀 ¡NGINX en marcha!</h1>
  <p>Tu servidor web se ha desplegado correctamente con Docker.</p>
  <a href="https://nginx.org/" target="_blank" class="button">Aprender más sobre NGINX</a>

  <footer>
    © 2025 - Servidor NGINX con Docker 🐳
  </footer>
</body>
</html>
